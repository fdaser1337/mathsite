<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathLab — Перенаправление</title>
  <script>
    // Определяем соответствие старых URL новым
    const urlMap = {
      'index.html': '/',
      'theorems.html': '/theorems.html',
      'integrals.html': '/integrals.html',
      'derivatives.html': '/derivatives.html',
      'algebra.html': '/algebra.html',
      'geometry-space.html': '/geometry-space.html',
      'probability-theory.html': '/probability-theory.html',
      'statistics.html': '/statistics.html',
      'differential-equations.html': '/differential-equations.html',
      'numerical-methods.html': '/numerical-methods.html',
      'complex-analysis.html': '/complex-analysis.html',
      'discrete-mathematics.html': '/discrete-mathematics.html',
      'about.html': '/about.html'
    };

    // Функция для переадресации
    function redirectToSPA() {
      const path = window.location.pathname;
      const filename = path.split('/').pop();
      
      // Если уже в SPA, ничего не делаем
      if (window.location.pathname.includes('app.html')) {
        return;
      }
      
      // Определяем новый URL
      let newUrl = '/app.html';
      
      if (filename && filename !== 'redirect.html') {
        // Добавляем хеш с путем к старой странице
        newUrl += '#!' + (urlMap[filename] || '/' + filename);
      }
      
      // Переадресация
      window.location.replace(newUrl);
    }

    // Немедленная переадресация
    redirectToSPA();
  </script>
</head>
<body>
  <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
    <h1>Перенаправление...</h1>
    <p>Если вы не перенаправлены автоматически, <a href="/app.html">нажмите сюда</a>.</p>
  </div>
</body>
</html>
